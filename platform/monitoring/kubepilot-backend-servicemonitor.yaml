apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubepilot-backend
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kubepilot-dev
      - kubepilot-staging
      - kubepilot-prod
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s

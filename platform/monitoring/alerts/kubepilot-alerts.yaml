apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubepilot-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: kubepilot.rules
      rules:
        - alert: KubePilotBackendDown
          expr: absent(up{job=~".*kubepilot-backend.*"} == 1)
          for: 2m
          labels:
            severity: critical
            app: kubepilot
          annotations:
            summary: "KubePilot backend target is down"
            description: "Prometheus is not able to scrape the KubePilot backend metrics endpoint."

        - alert: KubePilotDatabaseNotReady
          expr: kubepilot_database_ready == 0
          for: 1m
          labels:
            severity: warning
            app: kubepilot
          annotations:
            summary: "KubePilot database is not ready"
            description: "The backend reports that PostgreSQL is not ready."

        - alert: KubePilotHighRequestLatency
          expr: histogram_quantile(0.95, sum(rate(kubepilot_http_request_duration_seconds_bucket[5m])) by (le)) > 1
          for: 2m
          labels:
            severity: warning
            app: kubepilot
          annotations:
            summary: "KubePilot API latency is high"
            description: "95th percentile request latency is above 1 second."

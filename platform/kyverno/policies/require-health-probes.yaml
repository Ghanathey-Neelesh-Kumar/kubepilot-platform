apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-health-probes
  annotations:
    policies.kyverno.io/title: Require Health Probes
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: Containers should define readiness and liveness probes.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-readiness-and-liveness
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must define both readinessProbe and livenessProbe."
        pattern:
          spec:
            containers:
              - readinessProbe: "?*"
                livenessProbe: "?*"

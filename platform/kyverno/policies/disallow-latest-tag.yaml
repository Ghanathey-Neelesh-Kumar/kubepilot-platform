apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: Container images must not use the mutable latest tag in KubePilot application namespaces.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-non-latest-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kubepilot-dev
                - kubepilot-staging
                - kubepilot-prod
      validate:
        message: "Using the latest image tag is not allowed. Use a fixed version or commit SHA tag."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ contains(element.image, ':') }}"
                    operator: Equals
                    value: false

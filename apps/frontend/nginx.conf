server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
    }

    location /health {
        proxy_pass http://backend:5000/health;
    }

    location /ready {
        proxy_pass http://backend:5000/ready;
    }
}

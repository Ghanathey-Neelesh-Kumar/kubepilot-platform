apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-broken-backend
  namespace: kubepilot-dev
  labels:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: readiness-broken-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubepilot
      app.kubernetes.io/component: readiness-broken-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubepilot
        app.kubernetes.io/component: readiness-broken-backend
    spec:
      containers:
        - name: backend
          image: kubepilot-backend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_HOST
              value: kubepilot-postgres
            - name: DB_NAME
              value: kubepilot
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: kubepilot-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubepilot-db-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /wrong-ready-path
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: readiness-broken-backend
  namespace: kubepilot-dev
  labels:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: readiness-broken-backend
spec:
  selector:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: readiness-broken-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
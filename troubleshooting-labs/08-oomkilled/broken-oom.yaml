
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-broken-app
  namespace: kubepilot-dev
  labels:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: oom-broken-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubepilot
      app.kubernetes.io/component: oom-broken-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubepilot
        app.kubernetes.io/component: oom-broken-app
    spec:
      containers:
        - name: memory-hog
          image: python:3.12-slim
          command:
            - python
            - -c
            - |
              a=[]
              while True:
                  a.append("x" * 1024 * 1024)
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi

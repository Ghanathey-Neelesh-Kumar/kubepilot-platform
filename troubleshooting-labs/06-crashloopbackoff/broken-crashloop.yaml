apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-broken-app
  namespace: kubepilot-dev
  labels:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: crashloop-broken-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubepilot
      app.kubernetes.io/component: crashloop-broken-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubepilot
        app.kubernetes.io/component: crashloop-broken-app
    spec:
      containers:
        - name: crashloop
          image: busybox:1.36
          command: ["sh", "-c", "echo Starting app; echo Simulating crash; exit 1"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

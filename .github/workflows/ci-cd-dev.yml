
name: KubePilot CI/CD - Dev

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "k8s/**"
      - ".github/workflows/ci-cd-dev.yml"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: Ghanathey-Neelesh-Kumar
  BACKEND_IMAGE: kubepilot-backend
  FRONTEND_IMAGE: kubepilot-frontend

jobs:
  build-scan-push-update-dev:
    name: Build, Scan, Push and Update Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: bash
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image locally for scan
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE }}:dev

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          format: table
          exit-code: 0
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE }}:dev

      - name: Build frontend image locally for scan
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.FRONTEND_IMAGE }}:dev

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          format: table
          exit-code: 0
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.FRONTEND_IMAGE }}:dev

      - name: Update dev Kustomize image tags
        shell: bash
        run: |
          cd k8s/overlays/dev

          kustomize edit set image \
            kubepilot-backend=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}

          kustomize edit set image \
            kubepilot-frontend=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}

      - name: Commit updated dev image tags
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi

          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "Update dev image tags to ${{ steps.vars.outputs.SHORT_SHA }}"
          git push

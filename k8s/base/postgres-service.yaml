apiVersion: v1
kind: Service
metadata:
  name: kubepilot-postgres
  namespace: kubepilot
  labels:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

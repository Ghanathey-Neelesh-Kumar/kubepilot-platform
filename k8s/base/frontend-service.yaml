apiVersion: v1
kind: Service
metadata:
  name: kubepilot-frontend
  namespace: kubepilot
  labels:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30081

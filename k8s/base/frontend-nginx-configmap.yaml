apiVersion: v1
kind: ConfigMap
metadata:
  name: kubepilot-frontend-nginx
  namespace: kubepilot
  labels:
    app.kubernetes.io/name: kubepilot
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        listen 8080;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /api/ {
            proxy_pass http://kubepilot-backend:5000/api/;
        }

        location /health {
            proxy_pass http://kubepilot-backend:5000/health;
        }

        location /ready {
            proxy_pass http://kubepilot-backend:5000/ready;
        }
    } 

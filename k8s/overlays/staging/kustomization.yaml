apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

nameSuffix: -staging

namespace: kubepilot-staging

resources:
  - ../../base

patches:
  - path: namespace-patch.yaml
  - path: backend-replica-patch.yaml
  - path: frontend-replica-patch.yaml
  - path: backend-resource-patch.yaml
  - path: frontend-resource-patch.yaml
